title: "B.A."
titleTranslation: "B.A."
titlePhonetic: "B.A."
original: |
  अख़िरियुनि जी जोत किताबनि ते …
  पांउ गिटमिट ते क़ुर्बानु कयाईँ
  केॾो कष्टु कयाईँ किताबनि ते,
  केॾो नष्टु जिसिमु ऐं जान कयाईँ।

  अदी, ॿण पए मुई अंग्रेज़ी …
  मुरसम खे थ्या के साल परहे,
  जॾैंह जोभनु वयमु किनार करे
  मसा मुरसा आंदा ॿ हेरफ़ा B.A.
translation: |
  The last spark of my life was spent on books…
  I gave myself up completely to them.
  What hardship I suffered for those books,
  what ruin I brought upon body and soul.

  Brother, only then did I finally manage English…
  I studied for years and years,
  and by the time my youth had slipped away,
  only then did I return with the mere letters: B.A.
phonetic: |
  Akhiriyun ji jot kitaabani te …
  pan'u gitmit te qurbaanu kayaaeen
  ked'o kashtu kayaaeen kitaaban te,
  ked'o nashtu jismu ain jaan kayaaeen.

  Adi, b'an paye muii angrezii …
  mursam khe thyaa ke saal parhe,
  jad'ainh jobhanu vayamu kinaar kare
  masa mursa aanda b'a herfa B.A.
