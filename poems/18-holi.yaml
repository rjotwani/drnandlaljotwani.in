title: "होली"
titleTranslation: "Holi"
titlePhonetic: "Holi"
original: |
  अचु मिठरा तूं भाकुर पाई, अजु त आहे होली
  जुरियल रहूं, न जुदा थियूं, महफ़ूज़ु मिठरी टोली

  वणंदर गीहर, पकवान स्वादी, सनु आहे हमजोली
  रंगा में रतलु, प्रेम में पिसियलु, जिसिमु ऐं चोली

  सुहिणा सिंधी, सुहिणी सिंधियत, सुहिणी मुंहिंजी ॿोली
  सुहिणी आ ज़ुबान जैन्हिं में माउ ॾिनी मूंखे लोली

  ख़ुशी-अ जो आ ॾिनु आ, प्यार संदो पैगामु आ होली
  अचो त असीं ऐलानु कयूं त कायम रखंदासीं ॿोली
translation: |
  Come, my dear friend—put on your festive colors: today is Holi.
  Let's stay joined, not drift apart—safe in our sweet little circle.

  Rich food from the hearth, delicious dishes—today is togetherness;
  soaked in color, dissolved in love—body and scarf, all dyed as one.

  Beautiful are the Sindhis, beautiful is Sindhiyat, beautiful is my speech—
  beautiful is the tongue in which my mother sang me lullabies.

  It's a day of joy, Holi is love's message—
  come, let us declare: we will keep our language alive.
phonetic: |
  Achu mithraa tuun bhaakur paai, aj'u ta aahe Holi
  juriyal rahun, na judaa thiyun, mahfuzu mithri toli

  Van'ander geeher, pakwaan swaadi, san'u aahe humjoli
  ranga mein ratalu, prem mein pisiyalu, jisim ain choli

  Suhin'a Sindhi, suhin'i Sindhiyat, suhin'i munhinji b'oli
  suhin'i aa zubaan jainhin mein maau d'ini muunkhe loli

  Khushi-a jo aa d'in'u aa, pyaar sando paigaamu aa Holi
  acho ta aseen ailaan kayun ta kaaim rakhandasin B'oli
