title: "ज़ख्म तो जेके डिणा"
titleTranslation: "The Wounds You Gave"
titlePhonetic: "Zakhm To Jeke D'inaa"
original: |
  ज़ख्म तो जेके डिणा
  सो मां महफूज़ रखिया,
  तूंहिंजी हर “शै” खे मां
  सौगात ई समुझी आ!
  ज़ख्म तो जेके डिणा—

  चांदनी आई मां घर,
  सितारनि जी साडी पाई,
  मां त कुदरत जी इहा
  करामात ई समुझी आ!
  ज़ख्म तो जेके डिणा—

  मुंहिंजे परवाज़ जा पर
  पियो थो कटीं, कटंदो रहु,
  मां त तूंहिंजे तराशण खे
  इमदाद ई समुझी आ!
  ज़ख्म तो जेके डिणा—

  थी करे गर्भ में कत्लु
  कंहिं न्याणीअ जो, का माउ,
  डिसी डा[?]टारू बि रोणो, त
  बरसात ई समुझी आ!
  ज़ख्म तो जेके डिणा—

  धरती छो थी पे धुडे,
  विजु छो थी पे कुडे,
  तो न का गाल्हि, न का
  बात ई समुझी आ!
  ज़ख्म तो जेके डिणा—

  बारू भुखियो पो सुम्हे,
  आँचल में खीर बि कोन्हे,
  अहिड़ी फ़िज़ा खे फ़कति, तो
  रात ई समुझी आ!
  ज़ख्म तो जेके डिणा—

  ज़िंदगी मोलु थो करीं
  जा अनमोलु नेमत आ,
  तो त ज़िंदगी बि का
  खुराफात ई समुझी आ!
  ज़ख्म तो जेके डिणा—

  मां उनहिं मां न आहियां जे
  किया कंहिर में तूंहिंजे,
  तो मूंखे बि छा पंहिंजी
  औकात ई समुझी आ!
  ज़ख्म तो जेके डिणा—
translation: |
  The wounds you gave—
  I preserved them carefully;
  I took every single thing of yours
  as a gift, a keepsake.
  The wounds you gave—

  When moonlight entered my home,
  wearing a sari of stars,
  I understood it
  as a miracle of nature.
  The wounds you gave—

  If my wings are being clipped—
  keep cutting, if you must;
  I'll still take your shaping of me
  as help, as support.
  The wounds you gave—

  When an innocent child is killed in the womb—
  when a mother has to watch that—
  even if the heavens weep,
  people call it “just rain.”
  The wounds you gave—

  When the earth is shaken,
  when lightning strikes,
  you call it nothing—
  no matter, no meaning.
  The wounds you gave—

  When a hungry child falls asleep,
  with no milk even in the mother's shawl,
  you treat such a climate—
  as if it's merely “night.”
  The wounds you gave—

  This life is priceless—
  an unpriced blessing—
  yet you dismiss life itself
  as mere nonsense.
  The wounds you gave—

  I'm not one of those
  who wronged you in some cruel way—
  then why do you still reduce me
  to “my place,” my “status”?
  The wounds you gave—
phonetic: |
  Zakhm to jeke d'inaa
  so maan mahfuuz rakhiyaa,
  tuuhinjii har “shai” khe maan
  saugaat ii samujhii aa!
  Zakhm to jeke d'inaa—

  Chaandanii aaii maan ghar,
  sitaarani jii saad'ii paaii,
  maan ta kudarat jii ihaa
  karaamaat ii samujhii aa!
  Zakhm to jeke d'inaa—

  Munhinje parvaaz jaa par
  piyo tho katiin, katando rahu,
  maan ta tuuhinje taraashan khe
  imdaad ii samujhii aa!
  Zakhm to jeke d'inaa—

  Thii kare garbh mein qatlu
  kanhin niyaanii-a jo, kaa maau,
  disii d'aa[?]taaruu bi roṇo, ta
  barsaat ii samujhii aa!
  Zakhm to jeke d'inaa—

  Dhartii chho thii pe dhud'e,
  viju chho thii pe kud'e,
  to na kaa g'aalhi, na kaa
  baat ii samujhii aa!
  Zakhm to jeke d'inaa—

  Baaruu bhukhiyo po sumhe,
  aanchal mein khiir bi konhe,
  ahid'ii fizaa khe faqati, to
  raat ii samujhii aa!
  Zakhm to jeke d'inaa—

  Zindagii molu tho kariin
  jaa anmolu nemat aa,
  to ta zindagii bi kaa
  khuraafaat ii samujhii aa!
  Zakhm to jeke d'inaa—

  Maan unhin maan na aahiyaan je
  kiyaa kanhir mein tuuhinje,
  to muunkhe bi chhaa panhinjii
  auqaat ii samujhii aa!
  Zakhm to jeke d'inaa—
