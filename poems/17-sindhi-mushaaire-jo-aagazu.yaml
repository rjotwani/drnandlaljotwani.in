title: "सिंधी मुशाइरे जो आगाज़ु"
titleTranslation: "The Beginning of the Sindhi Mushaira"
titlePhonetic: "Sindhi Mushaaire Jo Aagazu"
original: |
  मुशाइरो संचालन जी जा इज़त ॾिनी आ
  इन लाइ अव्हांजा शुक्राना मञा थो
  मां मुशाइरे जो आगाज़ु करियां थो
  अव्हांजी दिल सां आजियां कयां थो

  मुअज़िज़ शाइरनि खे सद’अनि खां अगु
  संदन सुखुन कलाम ॿुधण खां अगु
  उफ़! हिक ॾुख भरी ख़बर ॾ्यनी आ
  त असांजी सिंधियत अलविदा करे रही आ

  मुअज़िज़ मेहमाननि खे निमाणी वेंती आ
  ॿ मिनटा उथी शांत थी घुरूं सभु दुआ
  सिंधियत न छॾे साथु असांजो अला!
  सिंधियत बिना सिंधी कीअं सदा’इबो भला!

  पलउ पाए, सरु झुकाए, असीं था माफ़ी घुरूं
  पैंहिंजे पेर ते था असीं पांअ कुहाड़ी हणूं
  समाज जूं करी माफु मंदायूं ए धणी
  सिंधियुनि विसारे छॾी आ सिंधियत सुहिणी

  असांजे रहिबरिन असांखे न आवाज़ु न वातु ॾिनो
  असांजे रहिबरिन असांखे न को घरु-घाटु ॾिनो,
  "थी वन’ओ जज़्बु - जिते जिते आहियो" जो उपदेशु ॾिनो
  सिंधियत खे कायम रखण जो नको को संदेशु ॾिनो।

  अजु मिठरी मदरी ॿोली ॾुखिया साह खणी रही आहे
  अजु सिंधियत ऐं सिंधी ॿोली अलविदा वठी रही आहे
  अजु घरनि में सिंधी ॿोली न ॻाल्हाई वञे थी
  अजु जी नस्ल सिंध्यत खां सफ़ा बेख़बर बणी आहे

  अजु सिंधियुनि जा इदारा ऐं सिंधियुनि लाइ बरपा इदारा
  बणिया आहिन स्वार्थ संदी राजनीती-अ जा आखाड़ा
  अदीब फनकार शाइर ऐं विद्वान आहिन माथी में
  फाटो दुहिल सखिनो कनो पियो थो वजे थाठा में

  मनु मायूस आ साहु घुटियल आ दिल आहे ॾरियल
  अहिरे माहोल में मनु आहे ॾाढ़ो मुंज्हलु
  सिंधी अदब जो वधारो सिंधी ॿोली-अ जो विकासु
  अहिरे आलम में त थियणु आहे ॾाढ़ो मुश्किल

  ॿुधिजीवी चुप आहे, नकुली हिरणु थो हिरखाए
  सिंधी ॿोली-अ जो हाफ़िज़ु, सिंधी ॿोली नथो ॻाल्हाए!
  कीअं कबो महफ़ूज़ु शाह सचल सामी-अ जो वर्सो
  वर्से जो हाफ़िज़ु ई ख़ुद वर्से खां महरूम आहे!

  इन अरदास सां हाणु कयां थो शाइरनि खे सलामु
  अची मंच ते वारे सां पेश कनि पैंहिंजो क़लामु
translation: |
  I have been given the honor of conducting this mushaira,
  and for that I offer you my heartfelt thanks.
  I am here to begin the mushaira,
  and I welcome you with all my heart.

  Before inviting the respected poets,
  and before hearing their beautiful verses,
  alas—there is one sorrowful piece of news to share:
  our Sindhi identity is bidding farewell.

  To the honored guests, I make a humble request:
  rise and pray—let us all pray—
  may Sindhi identity not abandon us, O God!
  For without Sindhi identity, how could we even be called Sindhi?

  With our shawls drawn and our heads bowed, we ask forgiveness—
  we strike our own feet and wound ourselves;
  forgive the failings of society, O Lord:
  Sindhis have forgotten that beautiful Sindhi spirit.

  Our leaders gave us neither a voice nor a path;
  our leaders gave us no home, no refuge.
  They offered no teaching of "awaken the passion—win, win,"
  and they gave no message for preserving Sindhi identity.

  Today, our sweet mother-tongue is breathing in pain;
  today, Sindhi identity and the Sindhi language are taking leave.
  Today, Sindhi is no longer spoken in homes;
  today's generation has become completely unaware of Sindhi identity.

  Today, Sindhi institutions—and institutions made "for Sindhis"—
  have turned into arenas of self-interest and politics.
  Writers, artists, poets, scholars—are left in misery;
  their torn hearts keep echoing, like a drumbeat of anguish.

  The mind is despondent, the breath feels choked, the heart is split—
  in such an atmosphere the mind is deeply troubled.
  The growth of Sindhi literature, the development of the Sindhi language—
  in such times has become extremely difficult.

  The intellectual stays silent; false pride struts about.
  The "guardian" of the Sindhi language doesn't even speak Sindhi!
  How will Shah, Sachal, and Saami's heritage be protected,
  when the so-called protector is himself deprived of that heritage?

  With this plea, I salute the poets:
  come to the stage, one by one, and present your words—your verses.
phonetic: |
  Mushaairo sanchaalan jii jaa izat d'inii aa
  in laai avhaanjaa shukraanaa manj'a tho
  Maan mushaaire jo aagazu kariyaan tho
  avhaanjii dil saan aajiyaan kayaan tho

  Muaziz shaairan khe sad'ain khaan ag'u
  sandan sukhun kalaam b'udhan kha ag'u,
  uf! Hika d'ukh bharii khabar d'yanii aa
  ta asaanjii Sindhiyat alvidaa kare rahii aa

  Muaziz mehmaanan khe nimaanii ventii aa
  b'a minta uthii shant thi ghuruun sabu duaa
  Sindhiyat na chhad'e saathu asaanjo alaa!
  Sindhiyat binaa Sindhi kiian sad'aibo bhalaa!

  Palau paae, saru jhukaae, aseen thaa maafi ghurun
  painhinje pera te thaa aseen paan'a kuhaari han'oon
  samaaj juun kari maafu mandaanyun e dhan'ii
  Sindhiyun visaare chhad'ii aa Sindhiyat suhin'ii

  Asaanje rahibarin asaankhe na aavaazu na vaatu d'ino
  asaanje rahibarin asaankhe na ko gharu-ghaatu d'ino,
  "thii van'o jazabu - jite jite aahiyo" jo updeshu d'ino
  Sindhiyat khe kaaim rakhan' jo nako ko sandeshu d'ino.

  Aj'u mithri madri b'oli d'ukhiyaa saaha khan'i rahii aahe
  aj'u Sindhiyat ain Sindhi b'olii alvidaa vathi rahii aahe
  aj'u ghrani mein Sindhii b'olii na g'aalhaaii van'je thii
  aj'u ji nasal Sindhyat khan safaa bekhabar ban'ii aahe

  Aj'u Sindhiyun jaa idaara ain Sindhiyun laai barpaa idaara
  ban'iyaa aahin swaarth sandii raajneetii-a ja aaakhaaraa
  adiba phankaar shaair ain vidwan aahin maathi mein
  phaato duhil sakhin'o kan'o piyo tho vaj'e thaatha mein

  Manu maayus aa saahu ghutiyal aa dil aahe d'ariyal
  aihere maahol mein manu aahe d'aadho munjhalu
  Sindhi adab jo wadhaaro Sindhi b'olii-a jo vikaasu
  aihire aalam mein ta thiyanu aahe d'aadho mushkil

  B'udhijiivii chup aahe, naqulii hiran'u tho hirkhaaye
  Sindhi b'oli-a jo hafizu, Sindhi b'oli natho g'aalhaaye!
  Kiian kabo mahafoozu Shaah Sachal Saamii-a jo varso
  verse jo haafizu ii khud verse khaan mehroom aahe!

  Ina ardaas saan haan'u kayaan tho shaairan khe salaamu
  achii manch te vaare saan pesh kani pahinjo qalaamu
