title: "मूं कयो आ प्यार .."
titleTranslation: "I Have Loved You..."
titlePhonetic: "Muun Kayo Aa Pyaar .."
original: |
  मूं कयो आ प्यारु, जेॾो तोखे,
  न करे कोई सघंदो, एॾो तोखे।

  पलक में कया पेश, तारा फ़लक जा,
  भाण्यां थो मां, ॾिसु हेॾो तोखे।

  मूं कयो आ प्यारु, जेॾो तोखे,
  न करे कोई सघंदो, एॾो तोखे।

  तोखे ॾिसां, न ॾिसां, ॿियो कुझु बि,
  प्यार सां प्यो मां पसां, केॾो तोखे।

  मूं कयो आ प्यारु, जेॾो तोखे,
  न करे कोई सघंदो, एॾो तोखे।

  आख़िरी न उन जी, मेहफ़ूज़ रहंदी,
  मजाल आ, को ॾिसे, तेॾो तोखे।

  मूं कयो आ प्यारु, जेॾो तोखे,
  न करे कोई सघंदो, एॾो तोखे।
translation: |
  I have loved you—so deeply—
  as no one else could ever love you.

  In a blink, I placed before you the stars of the sky;
  I feel I've seen you — that vividly, that completely.

  I have loved you—so deeply—
  as no one else could ever love you.

  Whether I look at you or not, nothing else remains;
  with love I keep gazing at you, so much—so intensely.

  I have loved you—so deeply—
  as no one else could ever love you.

  In the end, even they won't stay protected—
  let them try, if anyone dares to look at you that way.

  I have loved you—so deeply—
  as no one else could ever love you.
phonetic: |
  Muun kayo aa pyaaru, jed'o tokhe,
  na kare koii saghando, ed'o tokhe.

  Palak mein kayaa pesh, taaraa falak jaa,
  bhaanyaan tho maan, d'isu hed'o tokhe.

  Muun kayo aa pyaaru, jed'o tokhe,
  na kare koii saghando, ed'o tokhe.

  Tokhe d'isaan, na d'isaan, b'iyo kuchh bi,
  pyaar saan pyo maan pasaan, ked'o tokhe.

  Muun kayo aa pyaaru, jed'o tokhe,
  na kare koii saghando, ed'o tokhe.

  Akhirii na una ji, mehfooz rahandii,
  majaal aa, ko d'ise, ted'o tokhe.

  Muun kayo aa pyaaru, jed'o tokhe,
  na kare koii saghando, ed'o tokhe.
