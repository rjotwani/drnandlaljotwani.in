title: "Untitled"
titleTranslation: "Untitled"
titlePhonetic: "Untitled"
original: |
  हाणु त हलां थो मां, महिफिल मां यार -
  मिलंदासीं वरी, जॾांहि ख़ुदा चाहियो।

  मिलण' लाइ बेसबर, मिलण' ते बेख़बर मगर -
  तुहिंजी अखियुनि जी आजियां खे सदा भायिन्यो।

  ही-अ हिंसा, ही-उ ज़ुलुम, ही-उ झंगल जो राजु -
  अव्हां इंसान जी बस्ती में न रहिंदा आहियो।

  बेहाल बुखा में प्या मरन मिस्कीन मगर -
  अव्हां बुतनि ते वञी खीरु विझंदा आहियो।

  मुकद्दस आ मुहबत, अमन आहे इबादत …
  महज़ मुंहुन-ज़ुबानी इहो चवंदा आहियो।
translation: |
  Now I rise and leave this gathering, my friend—
  we shall meet again, whenever God wills.

  Restless to meet, though strangely unaware of meeting—
  I have always cherished the welcome in your eyes.

  This violence, this oppression, this jungle-rule—
  you were never meant to live in a human world.

  The poor are dying helplessly in hunger—
  while you go and pour milk over idols.

  Love is sacred; peace is worship…
  but you speak of it only with your lips.
phonetic: |
  Haan'u t'a halaan tho maan, mehfil maan yaar - 
  milandaansiin warii, jad'anhi khudaa chaahiyo.

  Milan' laai besabar, milan' t'e bekhabar magar -
  t'uhinji akhiyun ji aajiyaan khe sadaa bhaainyo.

  Hii-a hinsaa, hii-u zulum, hii-u jhangal jo raaj'u -
  avhaan insaan jii bastii mein na rahindaa aahiyo.

  Behaal bukha mein pyaa maran miskeen magar -
  avhaan but'an t'e vanj'ii khiru vijhandaa aahiyo.

  Mukadas aa muhabat, aman aahe ibaadat …
  mahaz munhun-zubaani iho chavanda aahiyo.
