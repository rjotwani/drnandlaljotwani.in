title: "पद्मश्री डॉ. मोतीलाल जोतवाणी - हिक अज़ीम शख्सियत"
titleTranslation: "Padma Shri Dr. Motilal Jotwani - A Great Personality"
titlePhonetic: "Padmashri Dr. Motilal Jotwani - Hika Aziim Shakhsiiyat"
hoverText:
  - "Dr. Motilal Jotwani is the late brother of Dr. Nandlal Jotwani. His contribution to the Sindhi language and Sindhiyat is immense."
  - "Another version of this poem had the line: 'A Shining, Sparkling Star in the Firmament of Sindhi Literature; a Precious Jewel in the Necklace of Humanity'."
  - "Sindhiyat refers to the essence of being Sindhi, encompassing the distinct culture, language, traditions, and lifestyle of the Sindhi people."
  - "Kohinoor is a Persian phrase meaning 'Mountain of Light'. It refers to one of the world's largest cut diamonds (105.6 carats). The name symbolizes exceptional brilliance and immense value."
  - "Dr. Motilal Jotwani is the late brother of Dr. Nandlal Jotwani. His contribution to the Sindhi language and Sindhiyat is immense."
original: |
  हू त सिंधियुनि जो शानु विद्वान बेमिसाल आहे
  हुन कयो सिंधी ऐं सिंधियत खे मालामाल आहे,
  अहिड़ो अज़ीम अदीबु, आलिम ऐं इंसान थो विरले मिले
  हू असांजी कौम जो हिक कोहिनूर {मोती लाल} आहे।
translation: |
  He is the {pride of the Sindhis}—an unparalleled scholar.
  He enriched the Sindhi language and {Sindhiyat}.
  Such a great writer, learned scholar, and true human being is rarely found—
  he is the {Kohinoor} of our community: {Motilal}.
phonetic: |
  Huu ta Sindhiyun jo shaanu vidwaan bemisaal aahe
  huna kayo Sindhi ain sindhiyat khe maalaamaal aahe,
  aihiro aziim adiibu, aalim ain insaan tho virle mile
  huu asaanji kaum jo hiku kohinoor Moti Lal aahe.
